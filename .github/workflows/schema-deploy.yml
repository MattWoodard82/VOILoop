name: Deploy Supabase Schema

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy schema to
        required: true
        type: choice
        default: demo-prod
        options:
          - demo-prod
      confirm:
        description: Type APPLY to run production schema deploy
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: schema-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-schema:
    name: Apply schema to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PILOT_ADMIN_EMAIL: ${{ vars.PILOT_ADMIN_EMAIL }}
      PILOT_ADMIN_PASSWORD: ${{ secrets.PILOT_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "APPLY" ]; then
            echo "Refusing to deploy. Input confirm must equal APPLY."
            exit 1
          fi

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing required secret SUPABASE_DB_URL in environment ${{ inputs.environment }}."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Missing required variable/secret NEXT_PUBLIC_SUPABASE_URL."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secret SUPABASE_SERVICE_ROLE_KEY."
            exit 1
          fi
          if [ -z "$PILOT_ADMIN_EMAIL" ]; then
            echo "Missing required variable PILOT_ADMIN_EMAIL."
            exit 1
          fi
          if [ -z "$PILOT_ADMIN_PASSWORD" ]; then
            echo "Missing required secret PILOT_ADMIN_PASSWORD."
            exit 1
          fi

      - name: Normalize and validate SUPABASE_DB_URL
        shell: bash
        run: |
          db_url="$SUPABASE_DB_URL"

          if [[ "$db_url" != postgres://* && "$db_url" != postgresql://* ]]; then
            echo "SUPABASE_DB_URL must start with postgres:// or postgresql://."
            exit 1
          fi

          if [[ "$db_url" == *"[YOUR-PASSWORD]"* || "$db_url" == *"<YOUR-PASSWORD>"* ]]; then
            echo "SUPABASE_DB_URL still contains a placeholder password value."
            exit 1
          fi

          if [[ "$db_url" != *"sslmode="* ]]; then
            if [[ "$db_url" == *"?"* ]]; then
              db_url="${db_url}&sslmode=require"
            else
              db_url="${db_url}?sslmode=require"
            fi
          fi

          if [[ "$db_url" =~ @([^:/?]+) ]]; then
            host="${BASH_REMATCH[1]}"
            if [[ "$host" == db.*.supabase.co ]]; then
              echo "SUPABASE_DB_URL points to direct host (${host}), which is typically unreachable from GitHub-hosted runners."
              echo "Set SUPABASE_DB_URL to the Supabase Session Pooler connection string host (*.pooler.supabase.com) for environment ${{ inputs.environment }}."
              exit 1
            fi
          fi

          echo "::add-mask::$db_url"
          echo "SUPABASE_DB_URL_NORMALIZED=$db_url" >> "$GITHUB_ENV"

      - name: Push Supabase migrations
        run: npx supabase@latest db push --db-url "$SUPABASE_DB_URL_NORMALIZED" --yes

      - name: Sync admin credentials
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          supabase_url = os.environ["NEXT_PUBLIC_SUPABASE_URL"].rstrip("/")
          service_role_key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          admin_email = os.environ["PILOT_ADMIN_EMAIL"]
          admin_password = os.environ["PILOT_ADMIN_PASSWORD"]

          auth_base = f"{supabase_url}/auth/v1"
          rest_base = f"{supabase_url}/rest/v1"

          def request_json(method, url, body=None, extra_headers=None):
            headers = {
              "Authorization": "Bearer " + service_role_key,
              "apikey": service_role_key,
            }
            if extra_headers:
              headers.update(extra_headers)
            data = None
            if body is not None:
              data = json.dumps(body).encode("utf-8")
              headers["Content-Type"] = "application/json"
            req = urllib.request.Request(url, data=data, method=method, headers=headers)
            with urllib.request.urlopen(req) as resp:
              payload = resp.read().decode("utf-8")
              if not payload:
                return {}
              return json.loads(payload)

          email_lc = admin_email.lower()
          page = 1
          user_id = None

          while True:
            query = urllib.parse.urlencode({"page": page, "per_page": 1000})
            users_response = request_json("GET", f"{auth_base}/admin/users?{query}")
            users = users_response.get("users", [])
            for user in users:
              if (user.get("email") or "").lower() == email_lc:
                user_id = user.get("id")
                break
            if user_id:
              break
            if len(users) < 1000:
              break
            page += 1

          if user_id:
            request_json(
              "PUT",
              f"{auth_base}/admin/users/{user_id}",
              {"password": admin_password, "email_confirm": True},
            )
          else:
            created = request_json(
              "POST",
              f"{auth_base}/admin/users",
              {"email": admin_email, "password": admin_password, "email_confirm": True},
            )
            created_user = created.get("user") or {}
            user_id = created_user.get("id")
            if not user_id:
              print("Failed to create admin user: response missing user.id", file=sys.stderr)
              sys.exit(1)

          request_json(
            "POST",
            f"{rest_base}/user_access?on_conflict=user_id",
            [{
              "user_id": user_id,
              "role": "admin",
              "must_change_password": False
            }],
            {"Prefer": "resolution=merge-duplicates,return=minimal"},
          )

          print(f"Admin credentials synced for {admin_email}")
          PY

      - name: Publish deployment summary
        run: |
          {
            echo "## Supabase migration deploy complete"
            echo ""
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Migrations folder: \`supabase/migrations/\`"
            echo "- Admin credentials synced from GitHub config for: \`$PILOT_ADMIN_EMAIL\`"
            echo "- Triggered by: \`${{ github.actor }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
