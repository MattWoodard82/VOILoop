name: Deploy Supabase Schema

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to deploy schema to
        required: true
        type: choice
        default: demo-prod
        options:
          - demo-prod
      confirm:
        description: Type APPLY to run production schema deploy
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: schema-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-schema:
    name: Apply schema to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PILOT_ADMIN_EMAIL: ${{ vars.PILOT_ADMIN_EMAIL }}
      PILOT_ADMIN_PASSWORD: ${{ secrets.PILOT_ADMIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "APPLY" ]; then
            echo "Refusing to deploy. Input confirm must equal APPLY."
            exit 1
          fi

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing required secret SUPABASE_DB_URL in environment ${{ inputs.environment }}."
            exit 1
          fi
          if [ -z "$PILOT_ADMIN_EMAIL" ]; then
            echo "Missing required variable PILOT_ADMIN_EMAIL."
            exit 1
          fi
          if [ -z "$PILOT_ADMIN_PASSWORD" ]; then
            echo "Missing required secret PILOT_ADMIN_PASSWORD."
            exit 1
          fi
          if [ -z "$(printf '%s' "$PILOT_ADMIN_EMAIL" | tr -d '[:space:]')" ]; then
            echo "PILOT_ADMIN_EMAIL cannot be empty or whitespace."
            exit 1
          fi
          if [ ${#PILOT_ADMIN_PASSWORD} -lt 8 ]; then
            echo "PILOT_ADMIN_PASSWORD must be at least 8 characters."
            exit 1
          fi

      - name: Normalize and validate SUPABASE_DB_URL
        shell: bash
        run: |
          db_url="$SUPABASE_DB_URL"

          if [[ "$db_url" != postgres://* && "$db_url" != postgresql://* ]]; then
            echo "SUPABASE_DB_URL must start with postgres:// or postgresql://."
            exit 1
          fi

          if [[ "$db_url" == *"[YOUR-PASSWORD]"* || "$db_url" == *"<YOUR-PASSWORD>"* ]]; then
            echo "SUPABASE_DB_URL still contains a placeholder password value."
            exit 1
          fi

          if [[ "$db_url" != *"sslmode="* ]]; then
            if [[ "$db_url" == *"?"* ]]; then
              db_url="${db_url}&sslmode=require"
            else
              db_url="${db_url}?sslmode=require"
            fi
          fi

          if [[ "$db_url" =~ @([^:/?]+) ]]; then
            host="${BASH_REMATCH[1]}"
            if [[ "$host" == db.*.supabase.co ]]; then
              echo "SUPABASE_DB_URL points to direct host (${host}), which is typically unreachable from GitHub-hosted runners."
              echo "Set SUPABASE_DB_URL to the Supabase Session Pooler connection string host (*.pooler.supabase.com) for environment ${{ inputs.environment }}."
              exit 1
            fi
          fi

          echo "::add-mask::$db_url"
          echo "SUPABASE_DB_URL_NORMALIZED=$db_url" >> "$GITHUB_ENV"

      - name: Push Supabase migrations
        run: npx supabase@latest db push --db-url "$SUPABASE_DB_URL_NORMALIZED" --yes

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Sync admin credentials
        shell: bash
        run: |
          psql "$SUPABASE_DB_URL_NORMALIZED" \
            -v ON_ERROR_STOP=1 \
            -v admin_email="$PILOT_ADMIN_EMAIL" \
            -v admin_password="$PILOT_ADMIN_PASSWORD" <<'SQL'
          select set_config('voiloop.admin_email', :'admin_email', false);
          select set_config('voiloop.admin_password', :'admin_password', false);

          do $$
          declare
            target_user_id uuid;
            admin_email text := lower(btrim(current_setting('voiloop.admin_email')));
            admin_password text := current_setting('voiloop.admin_password');
          begin
            if admin_email = '' then
              raise exception 'PILOT_ADMIN_EMAIL resolved to blank after trimming.';
            end if;

            select u.id
            into target_user_id
            from auth.users u
            where lower(u.email) = lower(admin_email)
            order by u.created_at asc
            limit 1;

            if target_user_id is null then
              select ua.user_id
              into target_user_id
              from public.user_access ua
              where ua.role = 'admin'
              order by ua.user_id
              limit 1;
            end if;

            if target_user_id is null then
              target_user_id := gen_random_uuid();

              insert into auth.users (
                id,
                instance_id,
                aud,
                role,
                email,
                encrypted_password,
                email_confirmed_at,
                raw_app_meta_data,
                raw_user_meta_data,
                created_at,
                updated_at
              )
              values (
                target_user_id,
                '00000000-0000-0000-0000-000000000000',
                'authenticated',
                'authenticated',
                admin_email,
                crypt(admin_password, gen_salt('bf')),
                now(),
                '{"provider":"email","providers":["email"]}'::jsonb,
                '{}'::jsonb,
                now(),
                now()
              );
            end if;

            update auth.users
            set email = admin_email,
                encrypted_password = crypt(admin_password, gen_salt('bf')),
                email_confirmed_at = coalesce(email_confirmed_at, now()),
                updated_at = now()
            where id = target_user_id;
            insert into public.user_access (user_id, role, must_change_password)
            values (target_user_id, 'admin', false)
            on conflict (user_id) do update
              set role = excluded.role,
                  must_change_password = excluded.must_change_password;
          end $$;
          SQL

      - name: Verify admin credentials are login-ready
        shell: bash
        run: |
          psql "$SUPABASE_DB_URL_NORMALIZED" \
            -v ON_ERROR_STOP=1 \
            -v admin_email="$PILOT_ADMIN_EMAIL" \
            -v admin_password="$PILOT_ADMIN_PASSWORD" <<'SQL'
          select set_config('voiloop.admin_email', :'admin_email', false);
          select set_config('voiloop.admin_password', :'admin_password', false);

          do $$
          declare
            expected_email text := lower(btrim(current_setting('voiloop.admin_email')));
            expected_password text := current_setting('voiloop.admin_password');
            target_user auth.users%rowtype;
            access_role text;
            access_must_change boolean;
          begin
            select u.*
            into target_user
            from auth.users u
            where lower(u.email) = expected_email
            order by u.created_at asc
            limit 1;

            if not found then
              raise exception 'Admin user not found for %', expected_email;
            end if;

            if target_user.email_confirmed_at is null then
              raise exception 'Admin user % is not email-confirmed.', expected_email;
            end if;

            if target_user.encrypted_password is null or target_user.encrypted_password = '' then
              raise exception 'Admin user % has no password hash.', expected_email;
            end if;

            if target_user.encrypted_password <> crypt(expected_password, target_user.encrypted_password) then
              raise exception 'Admin password hash verification failed for %.', expected_email;
            end if;

            select ua.role, ua.must_change_password
            into access_role, access_must_change
            from public.user_access ua
            where ua.user_id = target_user.id;

            if not found then
              raise exception 'user_access row missing for admin user %.', expected_email;
            end if;

            if access_role is distinct from 'admin' then
              raise exception 'user_access role is %, expected admin for %.', access_role, expected_email;
            end if;

            if access_must_change is distinct from false then
              raise exception 'must_change_password is %, expected false for %.', access_must_change, expected_email;
            end if;
          end $$;
          SQL

      - name: Publish deployment summary
        run: |
          {
            echo "## Supabase migration deploy complete"
            echo ""
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Migrations folder: \`supabase/migrations/\`"
            echo "- VOILoop admin credentials synced from GitHub config for: \`$PILOT_ADMIN_EMAIL\`"
            echo "- Admin credential verification: passed (hash + role + password gate checks)"
            echo "- Triggered by: \`${{ github.actor }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
