name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Ensure Supabase env defaults for build
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL not set; using CI placeholder."
            echo "NEXT_PUBLIC_SUPABASE_URL=https://example.supabase.co" >> "$GITHUB_ENV"
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY not set; using CI placeholder."
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-placeholder-anon-key" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Test (full suite)
        run: npm test

      - name: Start app for smoke check
        run: |
          npm run start -- --port 3000 > next-start.log 2>&1 &
          echo $! > next-start.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat next-start.log
          exit 1

      - name: Demo route smoke check (non-blocking)
        continue-on-error: true
        run: npm run smoke:routes -- http://127.0.0.1:3000

      - name: Print smoke logs on failure
        if: failure()
        run: |
          if [ -f next-start.log ]; then
            cat next-start.log
          else
            echo "next-start.log not found"
          fi

      - name: Stop app
        if: always()
        run: |
          if [ -f next-start.pid ]; then
            kill "$(cat next-start.pid)" || true
          fi

  migration-compatibility:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Validate Supabase migrations against fresh and legacy schemas
        shell: bash
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          set -euo pipefail

          apply_migrations() {
            local db_name="$1"
            for migration in $(find supabase/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
              psql "postgresql://postgres:postgres@127.0.0.1:5432/${db_name}" \
                -v ON_ERROR_STOP=1 \
                -f "$migration"
            done
          }

          setup_auth_prereqs() {
            local db_name="$1"
            psql "postgresql://postgres:postgres@127.0.0.1:5432/${db_name}" \
              -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;
          create schema if not exists auth;
          create table if not exists auth.users (
            id uuid primary key
          );
          SQL
          }

          assert_migration_invariants() {
            local db_name="$1"
            psql "postgresql://postgres:postgres@127.0.0.1:5432/${db_name}" \
              -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          begin
            if not exists (select 1 from pg_tables where schemaname = 'public' and tablename = 'participants') then
              raise exception 'participants table missing after migration';
            end if;

            if not exists (select 1 from pg_tables where schemaname = 'public' and tablename = 'user_roles') then
              raise exception 'user_roles table missing after migration';
            end if;

            if not exists (select 1 from user_roles where role = 'wellness_director') then
              raise exception 'expected wellness_director role row to exist';
            end if;

            if exists (select 1 from user_roles where role = 'staff') then
              raise exception 'legacy staff role should be normalized to wellness_director';
            end if;
          end $$;
          SQL
          }

          psql "postgresql://postgres:postgres@127.0.0.1:5432/postgres" -v ON_ERROR_STOP=1 -c "create database voiloop_migrations_fresh;"
          setup_auth_prereqs "voiloop_migrations_fresh"
          apply_migrations "voiloop_migrations_fresh"
          assert_migration_invariants "voiloop_migrations_fresh"

          psql "postgresql://postgres:postgres@127.0.0.1:5432/postgres" -v ON_ERROR_STOP=1 -c "create database voiloop_migrations_legacy;"
          setup_auth_prereqs "voiloop_migrations_legacy"
          psql "postgresql://postgres:postgres@127.0.0.1:5432/voiloop_migrations_legacy" \
            -v ON_ERROR_STOP=1 <<'SQL'
          create table if not exists user_roles (
            id uuid primary key default gen_random_uuid(),
            role text not null default 'staff'
          );

          insert into user_roles (role)
          values ('staff')
          on conflict do nothing;
          SQL
          apply_migrations "voiloop_migrations_legacy"
          assert_migration_invariants "voiloop_migrations_legacy"

          psql "postgresql://postgres:postgres@127.0.0.1:5432/voiloop_migrations_legacy" \
            -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          begin
            if not exists (
              select 1
              from information_schema.columns
              where table_schema = 'public'
                and table_name = 'user_roles'
                and column_name = 'id'
                and data_type = 'uuid'
            ) then
              raise exception 'legacy user_roles.id type was not preserved as uuid';
            end if;
          end $$;
          SQL
