name: Deployment Guard

on:
  pull_request:

permissions:
  contents: read
  deployments: read

jobs:
  block-production-deployments-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if PR head has Production deployment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.payload.pull_request.head.sha

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner,
                repo,
                sha,
                per_page: 100,
              }
            )

            const prodLike = deployments.filter((d) => {
              const env = (d.environment || '').toLowerCase()
              return d.production_environment === true || env === 'production'
            })

            if (prodLike.length > 0) {
              const details = prodLike
                .map((d) => `id=${d.id} env=${d.environment} created=${d.created_at}`)
                .join('\n')
              core.setFailed(
                `PR head commit ${sha} has production deployment(s), which is blocked.\n${details}`
              )
              return
            }

            core.info(`No production deployments found for PR head commit ${sha}.`)
